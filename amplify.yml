# Build spec AWS Amplify — frontend em SIGEO/ (Vite + React).
# IMPORTANTE: No console Amplify → Build settings → "Root directory" deve estar VAZIO (raiz do repo).
# Assim o build roda na raiz e usa a pasta SIGEO; o package-lock.json atualizado está em SIGEO/.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        - nvm install 20
        - nvm use 20
        - node -v
        - pwd && ls -la && ls -la SIGEO/package-lock.json 2>/dev/null || true
        - cd SIGEO && npm ci
    build:
      commands:
        - cd SIGEO && npm run build
        - ls -la SIGEO/dist
  artifacts:
    baseDirectory: SIGEO/dist
    files:
      - '**/*'
  cache:
    paths:
      - SIGEO/node_modules/**/*
  customHeaders:
    - pattern: '**'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, no-store, must-revalidate'
        - key: 'X-Frame-Options'
          value: 'SAMEORIGIN'
